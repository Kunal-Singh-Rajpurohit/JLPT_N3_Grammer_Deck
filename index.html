<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT N3 Grammar Flashcards (Ultimate)</title>
    <style>
        :root {
            --primary: #10b981; 
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --example-bg: #f1f5f9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 90%;
            max-width: 400px;
            perspective: 1000px;
        }
        .card {
            width: 100%;
            height: 550px; 
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-in-out;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 20px;
            background: var(--card-bg);
            text-align: center;
        }
        .card-face-back {
            transform: rotateY(180deg);
            text-align: left;
            justify-content: flex-start;
            overflow-y: auto;
            background: var(--card-bg);
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .pattern-name { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .explanation { font-size: 1.1rem; color: #475569; line-height: 1.5; padding: 0 10px; }
        .example-container { width: 100%; margin-bottom: 12px; background: var(--example-bg); padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); box-sizing: border-box; }
        .example-jp { font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; color: var(--text); }
        .example-en { font-size: 0.9rem; color: #64748b; line-height: 1.3; }
        .controls { margin-top: 25px; display: flex; gap: 20px; align-items: center; }
        button { padding: 15px 30px; border: none; border-radius: 50px; background: var(--primary); color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; touch-action: manipulation; }
        button:active { background: #059669; }
        .progress { font-size: 1.2rem; font-weight: bold; color: #64748b; margin-bottom: 20px; }
        .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 20px; position: absolute; bottom: 20px; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); cursor: pointer; z-index: 100; padding: 0; }
        .action-btns { width: 100%; display: flex; justify-content: space-between; margin-top: 15px; }
        .btn-small { padding: 8px 15px; font-size: 0.9rem; background: #e2e8f0; color: #334155; border-radius: 8px; }
        .btn-save-edit { background: #10b981; color: white; display: none; }
        .edit-fields { display: none; width: 100%; flex-direction: column; gap: 8px; }
        .edit-fields textarea { width: 100%; padding: 8px; font-size: 0.9rem; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; resize: none; box-sizing: border-box; height: 40px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 8px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.2rem; }
        .modal input, .modal textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .modal textarea { height: 40px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        .modal-actions button.btn-cancel { background: #e2e8f0; color: #334155; }
        .modal-actions button.btn-confirm { background: #10b981; }
    </style>
</head>
<body>

    <div class="progress" id="progress">1 / 90</div>

    <div class="container" id="swipe-container">
        <div class="card" id="card">
            <div class="card-face card-face-front">
                <div class="pattern-name" id="pattern-name">Loading...</div>
                <div class="explanation" id="explanation"></div>
                <div class="hint">Tap to see examples</div>
            </div>
            
            <div class="card-face card-face-back">
                <div id="examples-display" style="width: 100%;">
                    <div class="example-container"><div class="example-jp" id="ex1-jp">Loading...</div><div class="example-en" id="ex1-en"></div></div>
                    <div class="example-container"><div class="example-jp" id="ex2-jp">Loading...</div><div class="example-en" id="ex2-en"></div></div>
                    <div class="example-container"><div class="example-jp" id="ex3-jp">Loading...</div><div class="example-en" id="ex3-en"></div></div>
                    <div class="example-container"><div class="example-jp" id="ex4-jp">Loading...</div><div class="example-en" id="ex4-en"></div></div>
                    <div class="example-container"><div class="example-jp" id="ex5-jp">Loading...</div><div class="example-en" id="ex5-en"></div></div>
                </div>

                <div class="edit-fields" id="edit-fields">
                    <textarea id="edit-ex1-jp" placeholder="Ex 1 (JP)"></textarea><textarea id="edit-ex1-en" placeholder="Ex 1 (EN)"></textarea>
                    <textarea id="edit-ex2-jp" placeholder="Ex 2 (JP)"></textarea><textarea id="edit-ex2-en" placeholder="Ex 2 (EN)"></textarea>
                    <textarea id="edit-ex3-jp" placeholder="Ex 3 (JP)"></textarea><textarea id="edit-ex3-en" placeholder="Ex 3 (EN)"></textarea>
                    <textarea id="edit-ex4-jp" placeholder="Ex 4 (JP)"></textarea><textarea id="edit-ex4-en" placeholder="Ex 4 (EN)"></textarea>
                    <textarea id="edit-ex5-jp" placeholder="Ex 5 (JP)"></textarea><textarea id="edit-ex5-en" placeholder="Ex 5 (EN)"></textarea>
                </div>
                
                <div class="action-btns">
                    <button class="btn-small" id="btn-edit">Edit Examples</button>
                    <button class="btn-small btn-save-edit" id="btn-save-edit">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-prev">Prev</button>
        <button id="btn-next">Next</button>
    </div>

    <button class="fab" id="btn-add-card">+</button>

    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h3>Add N3 Grammar</h3>
            <input type="text" id="new-pattern" placeholder="Pattern (e.g. 〜おかげで)">
            <textarea id="new-explanation" placeholder="Explanation..."></textarea>
            <textarea id="new-ex1" placeholder="Ex 1: JP - EN"></textarea>
            <textarea id="new-ex2" placeholder="Ex 2: JP - EN"></textarea>
            <textarea id="new-ex3" placeholder="Ex 3: JP - EN"></textarea>
            <textarea id="new-ex4" placeholder="Ex 4: JP - EN"></textarea>
            <textarea id="new-ex5" placeholder="Ex 5: JP - EN"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-add">Cancel</button>
                <button class="btn-confirm" id="btn-confirm-add">Save Card</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const defaultData = [
                // CAUSE, REASON, DEPENDENCE
                { pat: "〜おかげで", exp: "Thanks to... (Positive result).", ex1jp: "先生のおかげで合格しました。", ex1en: "Thanks to the teacher, I passed.", ex2jp: "薬を飲んだおかげで治った。", ex2en: "Thanks to taking medicine, I healed.", ex3jp: "天気がいいおかげで楽しかった。", ex3en: "Thanks to the good weather, it was fun.", ex4jp: "彼が手伝ってくれたおかげで終わった。", ex4en: "Thanks to his help, it finished.", ex5jp: "奨学金のおかげで留学できた。", ex5en: "Thanks to the scholarship, I studied abroad." },
                { pat: "〜せいで", exp: "Because of... (Negative result / fault).", ex1jp: "雨のせいで中止になった。", ex1en: "Because of the rain, it was canceled.", ex2jp: "バスが遅れたせいで遅刻した。", ex2en: "Because the bus was late, I was tardy.", ex3jp: "食べすぎたせいで腹が痛い。", ex3en: "Because I ate too much, my stomach hurts.", ex4jp: "彼のせいで失敗した。", ex4en: "Because of him, we failed.", ex5jp: "寝不足のせいで頭が痛い。", ex5en: "Because of a lack of sleep, my head hurts." },
                { pat: "〜によって (Means/Cause)", exp: "By means of / Due to / Because of.", ex1jp: "事故によって電車が止まった。", ex1en: "Due to an accident, the train stopped.", ex2jp: "話し合いによって解決した。", ex2en: "It was resolved through discussion.", ex3jp: "インターネットによって世界が変わった。", ex3en: "Through the internet, the world changed.", ex4jp: "地震によって家が壊れた。", ex4en: "Because of the earthquake, houses broke.", ex5jp: "テストによって実力を測る。", ex5en: "We measure ability by means of a test." },
                { pat: "〜によって (Depending on)", exp: "Depending on... / Differs by...", ex1jp: "人によって考え方が違う。", ex1en: "Ways of thinking differ depending on the person.", ex2jp: "国によって習慣が異なる。", ex2en: "Customs differ depending on the country.", ex3jp: "日によって天気が変わる。", ex3en: "The weather changes depending on the day.", ex4jp: "場合によっては中止になる。", ex4en: "Depending on the situation, it will be canceled.", ex5jp: "年齢によって値段が違います。", ex5en: "The price differs depending on age." },
                { pat: "〜によって (Passive Agent)", exp: "By (someone). Used in passive voice sentences.", ex1jp: "この絵はピカソによって描かれた。", ex1en: "This picture was painted by Picasso.", ex2jp: "電話はベルによって発明された。", ex2en: "The telephone was invented by Bell.", ex3jp: "この本は彼によって書かれた。", ex3en: "This book was written by him.", ex4jp: "新法が政府によって発表された。", ex4en: "The new law was announced by the government.", ex5jp: "町は市長によって作られた。", ex5en: "The town was built by the mayor." },
                { pat: "〜からには", exp: "Now that... / Since... (Implies obligation/determination).", ex1jp: "約束したからには守るべきだ。", ex1en: "Now that you promised, you should keep it.", ex2jp: "日本にいるからには日本語を話したい。", ex2en: "Since I am in Japan, I want to speak Japanese.", ex3jp: "参加するからには勝ちたい。", ex3en: "Now that I'm participating, I want to win.", ex4jp: "プロであるからには責任がある。", ex4en: "Since you are a professional, you have responsibility.", ex5jp: "やると決めたからには最後までやる。", ex5en: "Now that I've decided to do it, I'll do it to the end." },
                { pat: "〜ばかりに", exp: "Simply because... (Leads to a negative result).", ex1jp: "お金がないばかりに大学を辞めた。", ex1en: "Simply because I had no money, I quit university.", ex2jp: "嘘をついたばかりに別れた。", ex2en: "Simply because I lied, we broke up.", ex3jp: "遅れたばかりに飛行機に乗れなかった。", ex3en: "Simply because I was late, I missed the flight.", ex4jp: "知らないばかりに苦労した。", ex4en: "Simply because I didn't know, I struggled.", ex5jp: "本当のことを言ったばかりに怒られた。", ex5en: "Simply because I told the truth, I got scolded." },
                { pat: "〜ものだから / 〜もので", exp: "Because... (Used for excuses/apologies).", ex1jp: "渋滞していたものだから、遅れました。", ex1en: "Because there was traffic, I was late.", ex2jp: "初めてなもので、分かりません。", ex2en: "Because it's my first time, I don't know.", ex3jp: "急いでいたものだから、忘れた。", ex3en: "Because I was in a hurry, I forgot.", ex4jp: "安かったもので、つい買った。", ex4en: "Because it was cheap, I unintentionally bought it.", ex5jp: "子どもなもので、許してください。", ex5en: "Because they are a child, please forgive them." },
                { pat: "〜ことだから", exp: "Knowing (that person)... (Assumption based on someone's character).", ex1jp: "真面目な彼のことだから、遅刻しない。", ex1en: "Knowing the serious him, he won't be late.", ex2jp: "忘れっぽい彼女のことだから、また忘れる。", ex2en: "Knowing the forgetful her, she'll forget again.", ex3jp: "優しい母のことだから、許してくれる。", ex3en: "Knowing my kind mother, she will forgive me.", ex4jp: "優秀な彼らのことだから、成功する。", ex4en: "Knowing the excellent them, they will succeed.", ex5jp: "子どものことだから、すぐ泣く。", ex5en: "Because they are children (as expected), they cry easily." },
                { pat: "〜だけに", exp: "Being that... / Precisely because... (As expected).", ex1jp: "一生懸命練習しただけに、優勝は嬉しい。", ex1en: "Precisely because I practiced hard, winning makes me happy.", ex2jp: "有名な店だけに、美味しい。", ex2en: "Being a famous shop, it is delicious.", ex3jp: "期待が大きかっただけに、ショックだ。", ex3en: "Precisely because expectations were high, the shock is big.", ex4jp: "安いだけに、すぐ壊れた。", ex4en: "Being that it was cheap, it broke quickly.", ex5jp: "彼は長く住んでいるだけに、詳しい。", ex5en: "Precisely because he has lived here long, he knows a lot." },

                // TIME, OCCURRENCE, SEQUENCE
                { pat: "〜最中に (さいちゅうに)", exp: "Right in the middle of doing something.", ex1jp: "会議の最中に電話が鳴った。", ex1en: "Right in the middle of the meeting, the phone rang.", ex2jp: "シャワーの最中に客が来た。", ex2en: "Right in the middle of the shower, a guest came.", ex3jp: "テストの最中に腹が痛くなった。", ex3en: "Right in the middle of the test, my stomach hurt.", ex4jp: "料理の最中にガスが止まった。", ex4en: "Right in the middle of cooking, the gas stopped.", ex5jp: "考えている最中に話しかけないで。", ex5en: "Don't talk to me right in the middle of thinking." },
                { pat: "〜うちに", exp: "While (a state persists) / Before (a state changes).", ex1jp: "若いうちに経験した方がいい。", ex1en: "While young, you should experience things.", ex2jp: "温かいうちに食べてください。", ex2en: "Please eat while it's warm.", ex3jp: "日本にいるうちに富士山に登りたい。", ex3en: "While in Japan, I want to climb Mt. Fuji.", ex4jp: "雨が降らないうちに帰ろう。", ex4en: "Before it rains, let's go home.", ex5jp: "忘れないうちにメモする。", ex5en: "Before I forget, I'll take a memo." },
                { pat: "〜間に (あいだに)", exp: "While / During the time when (An action occurs).", ex1jp: "母が寝ている間にゲームをした。", ex1en: "While my mother slept, I played a game.", ex2jp: "夏休みの間に本を５冊読んだ。", ex2en: "During summer vacation, I read 5 books.", ex3jp: "留守の間に泥棒が入った。", ex3en: "While I was away, a thief broke in.", ex4jp: "電車に乗っている間に寝た。", ex4en: "While riding the train, I slept.", ex5jp: "日本にいる間に友達ができた。", ex5en: "While in Japan, I made friends." },
                { pat: "〜たびに", exp: "Every time... / Whenever...", ex1jp: "この曲を聞くたびに昔を思い出す。", ex1en: "Every time I hear this song, I remember the past.", ex2jp: "彼は会うたびに髪の色が違う。", ex2en: "Every time I meet him, his hair color is different.", ex3jp: "買い物のたびに袋をもらう。", ex3en: "Every time I shop, I receive a bag.", ex4jp: "旅行のたびにお土産を買う。", ex4en: "Every time I travel, I buy souvenirs.", ex5jp: "失敗するたびに強くなる。", ex5en: "Every time you fail, you get stronger." },
                { pat: "〜ついでに", exp: "While doing A, take the opportunity to do B.", ex1jp: "散歩のついでに手紙を出した。", ex1en: "While walking, I mailed a letter.", ex2jp: "スーパーへ行くついでに銀行に寄る。", ex2en: "While going to the supermarket, I'll stop at the bank.", ex3jp: "掃除のついでに靴も洗った。", ex3en: "While cleaning, I also washed shoes.", ex4jp: "出張のついでに友達に会った。", ex4en: "While on a business trip, I met a friend.", ex5jp: "コンビニへ行くついでに水を買ってきて。", ex5en: "While going to the convenience store, buy water." },
                { pat: "〜てからでないと", exp: "Unless A happens, B cannot happen.", ex1jp: "上司に聞いてからでないと決められない。", ex1en: "Unless I ask my boss, I cannot decide.", ex2jp: "手を洗ってからでないと食べてはいけない。", ex2en: "Unless you wash hands, you must not eat.", ex3jp: "契約書を読んでからでないとサインできない。", ex3en: "Unless I read the contract, I cannot sign.", ex4jp: "病気が治ってからでないと運動できない。", ex4en: "Unless the illness is cured, you cannot exercise.", ex5jp: "お金をもらってからでないと渡せない。", ex5en: "Unless I get the money, I cannot hand it over." },
                { pat: "〜たとたん(に)", exp: "As soon as... / Just when...", ex1jp: "窓を開けたとたん、風が入った。", ex1en: "As soon as I opened the window, wind came in.", ex2jp: "お酒を飲んだとたん、顔が赤くなった。", ex2en: "As soon as he drank alcohol, his face turned red.", ex3jp: "ベッドに入ったとたん、寝た。", ex3en: "As soon as I got in bed, I slept.", ex4jp: "家を出たとたん、雨が降った。", ex4en: "As soon as I left the house, it rained.", ex5jp: "先生を見たとたん、安心した。", ex5en: "As soon as I saw the teacher, I felt relieved." },
                { pat: "〜か〜ないかのうちに", exp: "Right after... / The moment that...", ex1jp: "授業が終わるか終わらないかのうちに帰った。", ex1en: "He went home the moment class ended.", ex2jp: "ベッドに着くか着かないかのうちに寝た。", ex2en: "I fell asleep the moment I hit the bed.", ex3jp: "ベルが鳴るか鳴らないかのうちに走った。", ex3en: "I ran the moment the bell rang.", ex4jp: "雨が止むか止まないかのうちに出かけた。", ex4en: "I went out the moment the rain stopped.", ex5jp: "ドアが開くか開かないかのうちに飛び出した。", ex5en: "I jumped out the moment the door opened." },
                { pat: "〜次第 (しだい)", exp: "As soon as... (Used for future actions/business).", ex1jp: "分かり次第、連絡します。", ex1en: "As soon as I find out, I will contact you.", ex2jp: "荷物が着き次第、電話してください。", ex2en: "As soon as the package arrives, please call.", ex3jp: "雨が止み次第、出発します。", ex3en: "As soon as the rain stops, we will depart.", ex4jp: "会議が終わり次第、行きます。", ex4en: "As soon as the meeting ends, I will go.", ex5jp: "準備ができ次第、始めましょう。", ex5en: "As soon as preparations are done, let's begin." },
                { pat: "〜て以来 (ていらい)", exp: "Ever since... (A state has continued).", ex1jp: "日本に来て以来、毎日忙しい。", ex1en: "Ever since coming to Japan, I'm busy every day.", ex2jp: "卒業して以来、彼に会っていない。", ex2en: "Ever since graduating, I haven't met him.", ex3jp: "パソコンを買って以来、ゲームをしている。", ex3en: "Ever since buying a PC, I play games.", ex4jp: "あの事件以来、夜歩くのが怖い。", ex4en: "Ever since that incident, walking at night is scary.", ex5jp: "結婚して以来、夫が料理している。", ex5en: "Ever since marrying, my husband cooks." },
                { pat: "〜てはじめて", exp: "Not until... did I... / Only after... did I realize...", ex1jp: "病気になってはじめて、健康の大切さを知った。", ex1en: "Only after getting sick did I realize the importance of health.", ex2jp: "親になってはじめて、親の苦労が分かった。", ex2en: "Only after becoming a parent did I understand their struggles.", ex3jp: "失敗してはじめて、自分の弱さに気づいた。", ex3en: "Only after failing did I notice my weakness.", ex4jp: "外国に行ってはじめて、日本の良さが分かった。", ex4en: "Only after going abroad did I understand Japan's good points.", ex5jp: "彼と話してはじめて、誤解だと分かった。", ex5en: "Only after talking to him did I realize it was a misunderstanding." },

                // CONTRAST, COMPARISON, ADDITION
                { pat: "〜に比べて", exp: "Compared to...", ex1jp: "去年に比べて今年の夏は暑い。", ex1en: "Compared to last year, this summer is hot.", ex2jp: "東京は大阪に比べて人が多い。", ex2en: "Compared to Osaka, Tokyo has more people.", ex3jp: "兄に比べて弟は静かだ。", ex3en: "Compared to the older brother, the younger is quiet.", ex4jp: "昔に比べて便利になった。", ex4en: "Compared to the past, it became convenient.", ex5jp: "女性に比べて男性の方が背が高い。", ex5en: "Compared to women, men are taller." },
                { pat: "〜に加えて", exp: "In addition to...", ex1jp: "熱に加えて咳も出る。", ex1en: "In addition to fever, I have a cough.", ex2jp: "雨に加えて風も強くなった。", ex2en: "In addition to rain, the wind got stronger.", ex3jp: "日本語に加えて英語も勉強する。", ex3en: "In addition to Japanese, I study English.", ex4jp: "学費に加えて生活費もかかる。", ex4en: "In addition to tuition, living costs are required.", ex5jp: "日曜日に加えて土曜日も休みだ。", ex5en: "In addition to Sunday, Saturday is also a day off." },
                { pat: "〜に対して (Contrast)", exp: "In contrast to... / While...", ex1jp: "兄が静かなのに対して弟は話す。", ex1en: "In contrast to the quiet older brother, the younger talks.", ex2jp: "昨日は晴れたのに対して今日は雨だ。", ex2en: "While yesterday was sunny, today is rain.", ex3jp: "日本が湿気が多いのに対して欧州は乾燥している。", ex3en: "While Japan is humid, Europe is dry.", ex4jp: "夫は肉が好きなのに対して妻は魚が好きだ。", ex4en: "While the husband likes meat, the wife likes fish.", ex5jp: "Aが攻めるのに対してBは守る。", ex5en: "While A attacks, B defends." },

                editEx3Jp.value = data[currentIndex].ex3jp || ""; editEx3En.value = data[currentIndex].ex3en || "";
                editEx4Jp.value = data[currentIndex].ex4jp || ""; editEx4En.value = data[currentIndex].ex4en || "";
                editEx5Jp.value = data[currentIndex].ex5jp || ""; editEx5En.value = data[currentIndex].ex5en || "";
                
                btnEdit.style.display = 'none';
                btnSaveEdit.style.display = 'block';
            });

            btnSaveEdit.addEventListener('click', (e) => {
                e.stopPropagation(); 
                data[currentIndex].ex1jp = editEx1Jp.value; data[currentIndex].ex1en = editEx1En.value; 
                data[currentIndex].ex2jp = editEx2Jp.value; data[currentIndex].ex2en = editEx2En.value; 
                data[currentIndex].ex3jp = editEx3Jp.value; data[currentIndex].ex3en = editEx3En.value; 
                data[currentIndex].ex4jp = editEx4Jp.value; data[currentIndex].ex4en = editEx4En.value; 
                data[currentIndex].ex5jp = editEx5Jp.value; data[currentIndex].ex5en = editEx5En.value; 
                saveToStorage(); 
                
                ex1jp.textContent = data[currentIndex].ex1jp; ex1en.textContent = data[currentIndex].ex1en;
                ex2jp.textContent = data[currentIndex].ex2jp; ex2en.textContent = data[currentIndex].ex2en;
                ex3jp.textContent = data[currentIndex].ex3jp; ex3en.textContent = data[currentIndex].ex3en;
                ex4jp.textContent = data[currentIndex].ex4jp; ex4en.textContent = data[currentIndex].ex4en;
                ex5jp.textContent = data[currentIndex].ex5jp; ex5en.textContent = data[currentIndex].ex5en;
                
                examplesDisplay.style.display = 'block';
                editFields.style.display = 'none';
                btnEdit.style.display = 'block';
                btnSaveEdit.style.display = 'none';
            });

            btnAddCard.addEventListener('click', () => { modal.style.display = 'flex'; });

            btnCancelAdd.addEventListener('click', () => {
                modal.style.display = 'none';
                document.getElementById('new-pattern').value = ''; document.getElementById('new-explanation').value = '';
                document.getElementById('new-ex1').value = ''; document.getElementById('new-ex2').value = '';
                document.getElementById('new-ex3').value = ''; document.getElementById('new-ex4').value = '';
                document.getElementById('new-ex5').value = '';
            });

            btnConfirmAdd.addEventListener('click', () => {
                const pat = document.getElementById('new-pattern').value.trim();
                const exp = document.getElementById('new-explanation').value.trim();
                const parseEx = (val) => { const split = val.split('-'); return [split[0] ? split[0].trim() : "", split[1] ? split[1].trim() : ""]; };
                
                if (pat && exp) {
                    const ex1 = parseEx(document.getElementById('new-ex1').value.trim()); const ex2 = parseEx(document.getElementById('new-ex2').value.trim());
                    const ex3 = parseEx(document.getElementById('new-ex3').value.trim()); const ex4 = parseEx(document.getElementById('new-ex4').value.trim());
                    const ex5 = parseEx(document.getElementById('new-ex5').value.trim());

                    data.push({ 
                        pat: pat, exp: exp, 
                        ex1jp: ex1[0], ex1en: ex1[1], ex2jp: ex2[0], ex2en: ex2[1],
                        ex3jp: ex3[0], ex3en: ex3[1], ex4jp: ex4[0], ex4en: ex4[1],
                        ex5jp: ex5[0], ex5en: ex5[1]
                    });
                    
                    saveToStorage(); currentIndex = data.length - 1; updateCard(); btnCancelAdd.click();
                } else { alert("Please enter at least a Pattern and an Explanation!"); }
            });

            modal.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
            modal.addEventListener('touchend', (e) => e.stopPropagation(), {passive: true});

            let touchStartX = 0; let touchEndX = 0;
            const swipeContainer = document.getElementById('swipe-container');

            swipeContainer.addEventListener('touchstart', e => {
                if(e.target.tagName.toLowerCase() === 'textarea') return;
                touchStartX = e.changedTouches[0].screenX;
            }, {passive: true});

            swipeContainer.addEventListener('touchend', e => {
                if(e.target.tagName.toLowerCase() === 'textarea') return;
                touchEndX = e.changedTouches[0].screenX; handleSwipe();
            }, {passive: true});

            function handleSwipe() {
                const threshold = 50; 
                if (touchStartX - touchEndX > threshold) document.getElementById('btn-next').click();
                if (touchEndX - touchStartX > threshold) document.getElementById('btn-prev').click();
            }

            updateCard();
        });
    </script>
</body>
</html>
